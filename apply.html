  <main id="apply">
    
    <div class="wrap_section apply">
      <section class="section_apply">
      <h3 class="tit_txt">프로그램 참여 신청</h3>
      <form id="inquiryForm">
        <dl>
          <dt><label for="name">이름</label></dt>
          <dd><div class="wrap_input"><input type="text" id="name" name="name" placeholder="김00" required></div></dd>
          <dt><label for="birth">생년월일</label></dt>
          <dd><div class="wrap_input"><input type="date" id="birth" name="birth" placeholder="김00" required></div></dd>
          <dt><label for="tel">전화번호</label></dt>
          <dd><div class="wrap_input"><input type="tel" id="tel" name="tel" placeholder="010-0000-0000" pattern="[0-9]{2,3}-[0-9]{3,4}-[0-9]{3,4}" maxlength="13"></div></dd>
          <dt><label for="email">이메일</label></dt>
          <dd><div class="wrap_input"><input type="email" id="email" name="email" placeholder="twosome@twosome.com" required></div></dd>
          <dt><label for="content">참여동기</label></dt>
          <dd><div class="wrap_input"><textarea id="content" name="content" placeholder="신청하게 된 동기나 목적을 간단히 적어주세요"></textarea></div></dd>
          <dt><label for="like">관심분야</label></dt>
          <dd><div class="wrap_input"><input type="text" id="like" name="like" placeholder="최근 관심있는 분야를 적어주세요"></input></div></dd>
        </dl>
        <button type="submit" class="btn_submit">신청하기</button>
      </form>
      </section>
    </div>
  </main>

  <footer class="footer">
    <button class="btn_top"><i class="fa-solid fa-arrow-up"></i></button>
